apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      serviceAccountName: vault-auth
      containers:
        - name: demo-app
          image: stefanprodan/podinfo:6.7.0
          ports:
            - containerPort: 9898
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: demo-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-db-credentials
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: demo
spec:
  selector:
    app: demo-app
  ports:
    - port: 80
      targetPort: 9898
