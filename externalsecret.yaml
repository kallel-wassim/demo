apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-db-credentials
  namespace: demo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: demo-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: demo/db
        property: username
    - secretKey: password
      remoteRef:
        key: demo/db
        property: password
